# Paths include dotnet/templates/cli because the e2e scaffolds a dotnet-cli project
# through the dispatcher, and the root new-project.ps1/install.ps1 because they are
# the entry points these tests exercise.
name: new-project-cli
on:
  push:
    branches: [main]
    paths:
      - 'new-project/**'
      - 'new-project.ps1'
      - 'install.ps1'
      - 'dotnet/templates/cli/**'
      - '.github/workflows/new-project-cli.yml'
  pull_request:
    paths:
      - 'new-project/**'
      - 'new-project.ps1'
      - 'install.ps1'
      - 'dotnet/templates/cli/**'
      - '.github/workflows/new-project-cli.yml'
  workflow_dispatch:

jobs:
  new-project-cli:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Configure git identity (scaffold setup commit + CLI pre-flight)
        shell: pwsh
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "template-ci"

      - name: Dispatcher library tests
        shell: pwsh
        run: ./new-project/tests/lib-tests.ps1

      - name: Installer tests
        shell: pwsh
        run: ./new-project/tests/install-tests.ps1

      - name: Dispatcher arg/exit-code tests
        shell: pwsh
        run: ./new-project/tests/dispatcher-args-tests.ps1

      - name: End-to-end scaffold (dotnet-cli)
        shell: pwsh
        run: ./new-project/tests/e2e-dotnet-cli.ps1
