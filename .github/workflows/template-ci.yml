name: template-ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  scaffold-and-test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        template: [cli, durable, etl-api, mcp]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        if: matrix.template == 'durable'
        with:
          node-version: '22'

      - name: Install Azurite and Core Tools (durable only)
        if: matrix.template == 'durable'
        shell: pwsh
        run: |
          npm install -g azurite
          npm install -g azure-functions-core-tools@4

          # The integration fixture starts Core Tools with Process.Start("func") and
          # UseShellExecute=false, so CreateProcess only ever appends .exe when searching
          # PATH. npm's global bin holds func/func.cmd/func.ps1 shims but no func.exe, and
          # the tests fail with "The system cannot find the file specified". Put the
          # package's real func.exe on PATH for the later steps.
          $funcBin = Join-Path (npm root -g) 'azure-functions-core-tools\bin'
          if (-not (Test-Path (Join-Path $funcBin 'func.exe'))) {
            Write-Host "func.exe not found under $funcBin"
            exit 1
          }
          Add-Content -Path $env:GITHUB_PATH -Value $funcBin

      - name: Install templates from current source
        run: dotnet new install .

      - name: Scaffold test project
        run: dotnet new ${{ matrix.template }} -n ScaffoldTest -o ${{ runner.temp }}/scaffold-${{ matrix.template }}

      - name: Build scaffolded project
        working-directory: ${{ runner.temp }}/scaffold-${{ matrix.template }}
        run: dotnet build --no-incremental

      - name: Verify formatting (matches the scaffolded pre-commit gate)
        working-directory: ${{ runner.temp }}/scaffold-${{ matrix.template }}
        run: dotnet format --verify-no-changes

      - name: Run scaffolded tests
        if: matrix.template != 'durable'
        working-directory: ${{ runner.temp }}/scaffold-${{ matrix.template }}
        run: dotnet test --no-build --verbosity minimal

      # Azurite runs inside this step rather than a preceding one: started from its own
      # step it dies at the step boundary, and the integration tests then fail with
      # "Azurite is not listening on 10002". Keeping it here makes its lifetime cover the
      # tests that need it by construction.
      - name: Run scaffolded tests (durable, with Azurite)
        if: matrix.template == 'durable'
        shell: pwsh
        working-directory: ${{ runner.temp }}/scaffold-durable
        run: |
          $out = "$env:RUNNER_TEMP\azurite.out.log"
          $err = "$env:RUNNER_TEMP\azurite.err.log"

          function Show-AzuriteLog {
            Write-Host '--- azurite stdout ---'
            if (Test-Path $out) { Get-Content $out -Tail 40 }
            Write-Host '--- azurite stderr ---'
            if (Test-Path $err) { Get-Content $err -Tail 40 }
          }

          # Redirecting output makes Start-Process launch without ShellExecute, which skips
          # PATHEXT resolution and would pick npm's extensionless Unix shim ("%1 is not a
          # valid Win32 application"). Resolve the .cmd shim explicitly.
          $azurite = (Get-Command azurite.cmd -ErrorAction SilentlyContinue).Source
          if (-not $azurite) {
            Write-Host 'azurite.cmd is not on PATH after npm install -g azurite.'
            exit 1
          }

          # --inMemoryPersistence is mutually exclusive with --location: together Azurite
          # exits at once with "The --inMemoryPersistence option is not supported when the
          # --location option is set." --skipApiVersionCheck absorbs the skew between the
          # Azure.Storage SDK the DurableTask extension pulls and the API versions Azurite
          # declares, which otherwise fails the run with "The API version ... is not
          # supported by Azurite".
          $proc = Start-Process -FilePath $azurite -ArgumentList '--silent','--inMemoryPersistence','--skipApiVersionCheck' -PassThru -NoNewWindow -RedirectStandardOutput $out -RedirectStandardError $err

          # Durable state lives in tables, so probe 10002. Blob (10000) alone would come up
          # while durable still fails.
          $ready = $false
          $deadline = (Get-Date).AddMinutes(2)
          while (-not $ready -and (Get-Date) -lt $deadline) {
            if ($proc.HasExited) {
              # Start-Process -PassThru leaves ExitCode null for the .cmd shim, so only
              # report it when it survived. The captured stderr carries the real reason.
              $code = $proc.ExitCode
              if ($null -ne $code) { Write-Host "Azurite exited early with code $code." }
              else { Write-Host 'Azurite exited early.' }
              Show-AzuriteLog
              exit 1
            }
            $client = New-Object System.Net.Sockets.TcpClient
            try { $client.Connect('127.0.0.1', 10002); $ready = $true }
            catch { Start-Sleep -Seconds 1 }
            finally { $client.Dispose() }
          }

          if (-not $ready) {
            Write-Host 'Azurite did not open the table port (10002) within 2 minutes.'
            Show-AzuriteLog
            exit 1
          }

          Write-Host 'Azurite is listening on the table port (10002).'

          dotnet test --no-build --verbosity minimal
          $testExit = $LASTEXITCODE

          if ($testExit -ne 0) { Show-AzuriteLog }
          if (-not $proc.HasExited) { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue }

          exit $testExit

  expo-scaffold-and-validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Scaffold and validate expo template
        shell: pwsh
        run: ./expo/template-tests/scaffold-and-validate.ps1

  new-project-cli:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Configure git identity (scaffold setup commit + CLI pre-flight)
        shell: pwsh
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "template-ci"

      - name: Dispatcher library tests
        shell: pwsh
        run: ./new-project/tests/lib-tests.ps1

      - name: Installer tests
        shell: pwsh
        run: ./new-project/tests/install-tests.ps1

      - name: Dispatcher arg/exit-code tests
        shell: pwsh
        run: ./new-project/tests/dispatcher-args-tests.ps1

      - name: End-to-end scaffold (dotnet-cli)
        shell: pwsh
        run: ./new-project/tests/e2e-dotnet-cli.ps1

  plugin-validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Plugin manifest and skill sanity
        shell: pwsh
        run: ./plugin/template-tests/validate-plugin.ps1 -RequireFull

      - name: Stamp and resolve-repo tests
        shell: pwsh
        run: ./plugin/template-tests/stamp-test.ps1

      - name: Annotation hook tests
        shell: pwsh
        run: ./plugin/template-tests/annotate-test.ps1

      - name: Update-script tests
        shell: pwsh
        run: ./plugin/template-tests/update-scripts-test.ps1

      - name: Feedback-kind tests
        shell: pwsh
        run: ./plugin/template-tests/feedback-kind-test.ps1

      - name: Fold-events tests
        shell: pwsh
        run: ./plugin/template-tests/fold-events-test.ps1

      - name: Capture-review tests
        shell: pwsh
        run: ./plugin/template-tests/capture-review-test.ps1
